<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="tokens.css">
<style>
  .card {
    position: relative;
    width: 1600px;
    height: 1000px;
    overflow: hidden;
    background: var(--surface-brand);
    font-family: var(--sans);
    color: var(--ink);
    padding: 56px 64px 0;
    display: flex;
    flex-direction: column;
  }
  .glow {
    position: absolute;
    top: -320px; left: 50%;
    width: 1300px; height: 820px;
    transform: translateX(-50%);
    background: radial-gradient(ellipse at 50% 50%, rgba(255,255,255,0.6), rgba(255,255,255,0) 66%);
    pointer-events: none;
  }
  .stage {
    position: relative; z-index: 1;
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    min-height: 0;
  }
  .window {
    position: relative;
    display: inline-flex;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 30px 55px rgba(13,13,13,0.18);
    border: 1px solid rgba(13,13,13,0.06);
    max-height: 100%;
  }
  .window img { display: block; height: 720px; width: auto; max-width: 100%; }
  .tag {
    position: absolute; left: 22px; bottom: 22px; z-index: 2;
    display: inline-flex; align-items: center; gap: 9px;
    padding: 10px 16px 10px 14px;
    border-radius: 40px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(8px);
    box-shadow: 0 8px 18px rgba(0,0,0,0.12);
    font-size: 17px; font-weight: 600; color: var(--ink);
  }
  .tag .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--looka-pink); box-shadow: 0 0 0 4px var(--pink-shadow); }

  .footer {
    z-index: 1;
    display: flex; align-items: center; justify-content: space-between;
    height: 116px;
  }
  .footer .wordmark img { display: block; height: 26px; width: auto; }
  .footer .cap { font-family: var(--heading); font-weight: 700; font-size: 30px; letter-spacing: -0.015em; color: var(--ink); }
  .footer .cap b { color: var(--looka-pink); }
</style>
</head>
<body>
  <div class="card">
    <div class="glow"></div>
    <div class="stage">
      <div class="window">
        <img id="shot" src="assets/meet.png" alt="">
        <div class="tag"><span class="dot"></span><span id="tag">Product</span></div>
      </div>
    </div>
    <div class="footer">
      <span class="wordmark"><img src="assets/looka-logo.svg" alt="Looka"></span>
      <span class="cap" id="cap">Looka</span>
    </div>
  </div>
  <script>
    const p = new URLSearchParams(location.search);
    if (p.get('img')) document.getElementById('shot').src = 'assets/' + p.get('img');
    if (p.get('h')) document.getElementById('shot').style.height = p.get('h') + 'px';
    if (p.get('tag')) document.getElementById('tag').textContent = p.get('tag');
    if (p.get('cap')) document.getElementById('cap').innerHTML = p.get('cap');
  </script>
</body>
</html>
